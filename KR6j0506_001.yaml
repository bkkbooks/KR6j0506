body:
  text: 三藏法師般若惹羯羅撰若於聖天法大欲開靈驗者先造立天地盤則天盤長三寸又四寸地盤長方七寸以有乳木及香木一日之內造之天地共以白木作之造畫時不可見下劣之人必必精進潔齋以吉日為之依通法擇日合耳一頭天盤圓作觀東方安葉上唵字即變成日王歡喜天頭上在日輪於俗形而有瞋相面容赤色右手持吠琉璃收胸上左手持獨股收左腰摧壞部主名無憂大將被七阿僧祇眷屬圍繞居青石上南方葉上觀爾字即變為愛王歡喜天似法師形及其鼻胸下如面目右手持團餅安結跏上左手持蘿富根舉左肩間野干部主名象頭大將十八俱胝被眷屬圍繞居赤石上西方葉上觀頡哩字即變為月愛歡喜天其形美女也頭有花鬘右手持寶鏡左手支頰以寶篋為足端正殊妙色一牙部主名嚴髻大將一百四千俱胝眷屬被圍繞座虎皮上北方葉上觀忙字即變議特歡喜天其形青色如憍尸迦天左右手各作刀印收各方腰龍象部主名頂行大將一俱胝那臾多眷屬圍繞踞黑石次明地盤衆東方安帝釋天東南方安火天南方安炎魔天西南方安羅剎天西方安水天西北方安風天北方安毗沙門天東北方安大自在天安草八宿卅六禽如是次第建立之矣天盤四天皆一體也非異體者若中亦安多波天無妨礙次召請印以二小指二無名指相鉤向內以二中指立相叉又以二頭指各竪付中指以二大指亦竪付近頭指側大指去來明曰四天通用唵簸迦羅二合主拏禰去縛哆野二合次用普印伴呪曰唵簸迦羅二合三萬眷屬從恆河沙守護自他祈祈決定急急如律令次地盤衆等召請印作帝殊羅施印以二小指二無名指叉於掌內竪二中指頭相捻以二頭指各加中指背節下半分大指來去呪曰唵一鑠都嚕二波羅摩馱儞曳三莎訶通八方天次二十八宿三十六禽召請印用輪壇印通呪曰唵知里安疑嚕儞曳莎訶次請一切諸天類等印呪金剛合掌立二空去來呪曰富順愛神相合部類宴坐引入伴族一億二億一切諸頭頭契來入入入娑婆呵次次供養契印悉求他之中云云盛冥文符裏某甲耳祕攝符固對表畫斷也右欲望官位爵祿者以日輪天加帝釋天若欲令他熱病者以日輪天加火天王若欲得福德者以月愛天加毗沙門天祈之若欲得他愛念者以月愛天加毗沙門天使者呼二十八宿若欲勝兵軍者以日輪天加大自在天呼一萬眷屬若欲得人心遂吾思者以議特天加炎魔天若一切人欲被愛敬者以愛王天加毗沙門天若欲得他人財寶者以月愛天加大自在天若夫妻之中欲令愛念者以月愛天加帝釋天若夫妻之中欲令相離者以議特天加水天王若欲忽死敵惡人怨敵者以愛王天加羅剎天若從者逃走欲令還來者以愛王天加大自在天呼其從者姓名若懷妊之女早安欲令産生者以月愛天加炎魔天好矣若被呪咀時欲被還者以日輪天加羅剎天祈申之欲令他人風病者以議特天加風天祈之欲止病瘡癰疸一切瘡病以愛王天加炎魔天願祈之欲止長血赤痢者以日輪天加帝釋天祈申欲止雨降難者以愛王天加帝釋天欲止旱魃降雨者以議特天加水天王欲止腹病頭病者以日輪天加炎魔天欲遂論議決𬿥者以日輪天加大自在呼二十八宿等欲付公私遂所聖事者以愛王天加帝釋天欲得愜年穀者以議特天加帝釋天欲家內靜者以愛王天加毗沙門天欲止口舌事者以愛王天加自在天欲止物怪惡夢者以日輪天加炎魔天欲使者遣遠早返來者以議特天加風天忽返來如是一一合法對祈申所念之事必成就對時誦根本呪印云云次結三部護身印明依諸通印都合攝鉤印二手內縛置頂上散呪曰唵薩羅薩羅天地都合禁禁吽吽跘次結對印不動謁哦印呪曰吽吽吉儞吉儞吽泮半音娑婆呵次十方結界印地結方牆虛空結印等真言亦爾云云次以糸對之呪曰唵乞曳曳曳吽件法天法國於菩提寺所傳也其調度不多類時人皆號驗法焉附同天次第一卷先淨三業印真言次護身真言印次向建受三度建吞之次天鼓三七返次向本尊禮三返次著座次塗香淨手次加持灑水散壇上并供物及室內悉令清淨次表白事由次神分祈願次大金剛輪真言印次輪壇真言印次勝悉地真言印次三部三昧心真言印次三刀偈次如來拳印次道場觀次天盤聖衆勸請明印次天盤伴天印次地盤衆勸請明印次地盤伴天印次二十八宿并三十六禽明印次地申明印次避除結界明印次玉女真言印但申次用之次示三昧耶明印次閼伽明印次花座明印次善來偈次閼伽明印次塗香明印次花供印次燒香明印次飲食燈明印次普供養明印次大金剛輪明印次合掌誦天盤衆二十八宿三十六禽名號三返次誦七星并九天名號二返次三部三昧耶心明印次地結明印次方隅界明印次上方結界明印次對印明若以糸對盤或不然次護身真言印次取珠三回香盤置本處次結根本印取珠念誦任意要天呪次念誦了去珠在本處次左方塗香次花塗燒飲燈次普供養次祈願次閼伽次回向次結界次奉送次三部護身印明次出堂聖天次第一卷一交了興然之本
